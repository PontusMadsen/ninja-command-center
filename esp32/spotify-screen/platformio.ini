[env:t-display-s3]
platform = espressif32@6.9.0
board = lilygo-t-display-s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.3.0

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_BL=38
    -DTFT_MISO=-1
    -DTFT_MOSI=17
    -DTFT_SCLK=18
    -DTFT_CS=6
    -DTFT_DC=7
    -DTFT_RST=5
    -DTOUCH_CS=-1
    -DSPI_FREQUENCY=80000000
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_GFXFF
